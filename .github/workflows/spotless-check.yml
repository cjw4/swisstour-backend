name: Spotless Formatting Check

on:
  pull_request:
    branches:
      - main

jobs:
  spotless-check:
    name: Spotless Formatting Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Spotless check
        run: mvn -B spotless:check
