spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/swiss-dg-db}
    username: ${JDBC_DATABASE_USERNAME:${DB_USERNAME_DEV}}
    password: ${JDBC_DATABASE_PASSWORD:${DB_PASSWORD_DEV}}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
error:
  handling:
    full-stacktrace-http-statuses: 5xx
server:
  error:
    include-message: always
app:
  frontend:
    url: "http://localhost:4200"
    urlDiscgolf: ""
logging:
  level:
    root: INFO
    dg.swiss.swiss_dg_db: DEBUG




