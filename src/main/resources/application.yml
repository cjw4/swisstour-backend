spring:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
error:
  handling:
    http-status-in-json-response: true
    log-levels:
      5xx: ERROR
    codes:
      PlayerPdgaNumberUnique: PLAYER_PDGA_NUMBER_UNIQUE
      PlayerSdaNumberUnique: PLAYER_SDA_NUMBER_UNIQUE
app:
  google-sheet:
    csv-url: ${GOOGLE_SHEET_CSV_URL}



